name: "soundcloud-downloader"

on:
  workflow_dispatch:
    inputs:
      urls:
        description: >
          Enter one or more SoundCloud URLs (track, set, playlist).
          Separate by commas, spaces, or newlines.
        required: true
        type: string
      output_format:
        description: "Output Format"
        required: true
        type: choice
        options:
          - mp3
          - flac
          - ogg
          - opus
          - m4a
          - wav
        default: mp3
      audio_quality:
        description: "Audio Quality"
        required: true
        type: choice
        options:
          - 128k
          - 192k
          - 256k
          - 320k
        default: 320k

permissions:
  contents: write

jobs:
  music-download:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        shell: bash
        run: |
          set -e
          echo "::group::System packages"
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg curl jq zip python3 python3-pip
          echo "::endgroup::"

          echo "::group::Python tools"
          pip3 install --quiet --upgrade pip
          pip3 install --quiet --upgrade yt-dlp
          echo "::endgroup::"

          echo "::group::Versions"
          ffmpeg -version 2>&1 | head -n1
          python3 --version
          yt-dlp --version
          echo "::endgroup::"

      - name: Create Music Folder
        run: mkdir -p music

      - name: Parse and Filter SoundCloud URLs
        id: parse
        shell: bash
        run: |
          RAW="${{ github.event.inputs.urls }}"
          URLS=$(echo "$RAW" | tr ',' ' ' | tr '\n' ' ' | tr -s ' ' | sed 's/^ *//;s/ *$//')

          if [ -z "$URLS" ]; then
            echo "::error::No URLs provided."
            exit 1
          fi

          rm -f soundcloud_urls.txt

          for url in $URLS; do
            if [[ "$url" == *soundcloud.com* ]]; then
              echo "$url" >> soundcloud_urls.txt
            else
              echo "::warning::Skipping non-SoundCloud URL: $url"
            fi
          done

          echo "::group::SoundCloud URLs to download"
          cat soundcloud_urls.txt 2>/dev/null || echo "(none)"
          echo "::endgroup::"

          if [ -s soundcloud_urls.txt ]; then
            echo "HAS_SOUNDCLOUD=true" >> $GITHUB_OUTPUT
          else
            echo "::error::No valid SoundCloud URLs found."
            echo "HAS_SOUNDCLOUD=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Download SoundCloud
        if: steps.parse.outputs.HAS_SOUNDCLOUD == 'true'
        shell: bash
        run: |
          FORMAT="${{ github.event.inputs.output_format }}"
          QUALITY="${{ github.event.inputs.audio_quality }}"
          FAILED="failed_urls.txt"
          rm -f "$FAILED"

          echo "::group::SoundCloud download config"
          echo "Format : $FORMAT"
          echo "Quality: $QUALITY"
          echo "Folder : music/"
          echo "Options: embed thumbnail + ID3 tags"
          echo "::endgroup::"

          while IFS= read -r url; do
            [ -z "$url" ] && continue
            echo "::group::Downloading: $url"
            if yt-dlp \
              -x \
              --audio-format "$FORMAT" \
              --audio-quality "$QUALITY" \
              --embed-thumbnail \
              --embed-metadata \
              -o "music/%(artist)s - %(title)s.%(ext)s" \
              "$url"; then
              echo "✓ Success"
            else
              echo "✗ Failed – recording URL"
              echo "$url" >> "$FAILED"
            fi
            echo "::endgroup::"
          done < soundcloud_urls.txt

          echo "::group::SoundCloud summary"
          ls -lh music/ 2>/dev/null || echo "No files"
          if [ -f "$FAILED" ]; then
            echo "::warning::Some downloads failed (see below)"
            cat "$FAILED"
          else
            echo "All downloads succeeded."
          fi
          echo "::endgroup::"

      - name: Collect Failed URLs
        if: always()
        shell: bash
        run: |
          if [ -f failed_urls.txt ] && [ -s failed_urls.txt ]; then
            echo "::warning::Some downloads failed. Adding failed_downloads.txt to the zip."
            cp failed_urls.txt music/failed_downloads.txt
          else
            echo "No failed downloads – no fail log needed."
          fi

      - name: Validate Download
        shell: bash
        run: |
          SONG_COUNT=$(find music -type f ! -name 'failed_downloads.txt' | wc -l)
          if [ "$SONG_COUNT" -eq 0 ]; then
            echo "::error::No audio files were downloaded. Exiting."
            exit 1
          fi
          echo "Total songs downloaded: $SONG_COUNT"
          ls -lh music/

      - name: Create Split Zip Archive
        shell: bash
        run: |
          RANDOM_STR=$(python3 -c "import random, string; print(''.join(random.choices(string.ascii_lowercase + string.digits, k=5)))")
          BASE_NAME="music-${RANDOM_STR}"
          ZIP_NAME="${BASE_NAME}.zip"

          echo "Creating split zip: $ZIP_NAME (99 MB parts)"

          cd music || exit 1
          zip -r -s 99m "../${ZIP_NAME}" .
          cd ..

          # Move all parts into the music folder for commit
          rm -rf music/*
          mv ${BASE_NAME}.* music/ 2>/dev/null || mv ${ZIP_NAME} music/ 2>/dev/null || true
          ls -lh music/

      - name: Upload to music folder
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 524288000

          if [ -z "$(ls -A music/)" ]; then
            echo "No zip to upload."
            exit 0
          fi

          git add music/
          COMMIT_MSG="Add: $(ls -1 music/ | tr '\n' ' ' | sed 's/ *$//') [skip ci]"
          git commit -m "$COMMIT_MSG" || echo "Nothing to commit"

          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "Push attempt $i..."
            git pull --rebase --autostash origin "$BRANCH"
            if git push origin "$BRANCH"; then
              echo "Push succeeded."
              break
            else
              [ $i -lt $RETRIES ] && sleep 3 || exit 1
            fi
          done

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -rf music release_files soundcloud_urls.txt failed_urls.txt *.zip 2>/dev/null || true
